<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel DJ - Song Request</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', sans-serif;
      color: #fff; min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header h1 span { color: #a855f7; }
    .badge {
      background: #a855f7; color: #fff;
      border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 600;
    }
    .status-bar {
      background: rgba(168,85,247,0.1);
      border-bottom: 1px solid rgba(168,85,247,0.2);
      padding: 10px 24px;
      display: flex; gap: 20px; font-size: 13px; color: rgba(255,255,255,0.6);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .layout { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 100px); }

    /* Queue panel */
    .queue-panel { padding: 20px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.08); }
    .queue-panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }

    .request-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 16px;
      margin-bottom: 12px; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .request-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(168,85,247,0.4); }
    .request-card.selected { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.6); }

    .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .ig-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .ig-info .username { font-weight: 600; font-size: 14px; }
    .ig-info .ig-label { font-size: 11px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 4px; }
    .ig-icon { font-size: 11px; }
    .song-name { font-size: 18px; font-weight: 700; color: #fff; }
    .artist-name { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .msg-text { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 8px; font-style: italic; }
    .time-label { position: absolute; top: 14px; right: 14px; font-size: 11px; color: rgba(255,255,255,0.3); }

    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-send-led {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-send-led:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(168,85,247,0.4); }
    .btn-reject {
      padding: 10px 16px; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; background: transparent; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-reject:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #ef4444; }

    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* LED Preview panel */
    .led-panel { background: #000; display: flex; flex-direction: column; }
    .led-header { padding: 14px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); }
    .led-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden; cursor: pointer;
    }
    .led-screen::before {
      content: 'Clic para pantalla completa';
      position: absolute; bottom: 12px; right: 12px;
      font-size: 10px; color: rgba(255,255,255,0.2); pointer-events: none;
    }
    .led-content { text-align: center; padding: 24px; width: 100%; }
    .led-song {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 900; color: #fff;
      text-shadow: 0 0 30px rgba(168,85,247,0.8), 0 0 60px rgba(168,85,247,0.4);
      line-height: 1.1; letter-spacing: -0.5px;
    }
    .led-artist {
      font-size: clamp(14px, 3vw, 22px);
      color: rgba(255,255,255,0.6); margin-top: 8px;
    }
    .led-user {
      margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .led-ig-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .led-username { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 600; }
    .led-msg { margin-top: 14px; font-size: 13px; color: rgba(255,255,255,0.4); font-style: italic; }
    .led-idle { color: rgba(255,255,255,0.15); font-size: 16px; }

    .btn-fullscreen {
      width: 100%; padding: 14px;
      background: rgba(168,85,247,0.2); border: none; border-top: 1px solid rgba(168,85,247,0.3);
      color: #a855f7; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-fullscreen:hover { background: rgba(168,85,247,0.3); }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .led-panel { display: none; }
    }
  </style>
</head>
<body>
<header>
  <h1>🎧 Panel <span>DJ</span></h1>
  <span class="badge" id="countBadge">0 en cola</span>
</header>
<div class="status-bar">
  <span><span class="status-dot"></span>Conectado en tiempo real</span>
  <span id="lastUpdate">Esperando solicitudes...</span>
</div>

<div class="layout">
  <div class="queue-panel">
    <h2>Cola de solicitudes</h2>
    <div id="requestList">
      <div class="empty-state">
        <div class="icon">🎵</div>
        <p>Aun no hay solicitudes</p>
        <p style="font-size:12px;margin-top:4px;">Comparte el QR para empezar</p>
      </div>
    </div>
  </div>

  <div class="led-panel">
    <div class="led-header">Vista previa — Pantalla LED</div>
    <div class="led-screen" id="ledScreen" onclick="openFullscreen()">
      <div class="led-content" id="ledContent">
        <div class="led-idle">Selecciona una solicitud para enviar a la pantalla</div>
      </div>
    </div>
    <button class="btn-fullscreen" onclick="openFullscreen()">⛶ Abrir pantalla LED completa</button>
  </div>
</div>

<script>
const BACKEND_URL = 'BACKEND_PLACEHOLDER';
let requests = [];
let selectedId = null;

async function fetchRequests() {
  try {
    const res = await fetch(BACKEND_URL + '/requests');
    const data = await res.json();
    if (JSON.stringify(data) !== JSON.stringify(requests)) {
      requests = data;
      renderList();
      document.getElementById('lastUpdate').textContent = 'Ultima actualizacion: ' + new Date().toLocaleTimeString();
    }
  } catch(e) { console.log('Error fetching:', e); }
}

function renderList() {
  const list = document.getElementById('requestList');
  document.getElementById('countBadge').textContent = requests.length + ' en cola';
  if (requests.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎵</div><p>Aun no hay solicitudes</p><p style="font-size:12px;margin-top:4px;">Comparte el QR para empezar</p></div>';
    return;
  }
  list.innerHTML = requests.map(r => `
    <div class="request-card ${r.id === selectedId ? 'selected' : ''}" id="card-${r.id}" onclick="selectCard('${r.id}')">
      <div class="time-label">${timeSince(r.timestamp)}</div>
      <div class="card-top">
        <div class="ig-avatar">🎵</div>
        <div class="ig-info">
          <div class="username">${r.igUser ? '@' + r.igUser : 'Anonimo'}</div>
          ${r.igUser ? '<div class="ig-label"><span class="ig-icon">📸</span> Instagram</div>' : ''}
        </div>
      </div>
      <div class="song-name">${esc(r.song)}</div>
      ${r.artist ? '<div class="artist-name">— ' + esc(r.artist) + '</div>' : ''}
      ${r.message ? '<div class="msg-text">"${esc(r.message)}"</div>' : ''}
      <div class="card-actions">
        <button class="btn-send-led" onclick="sendToLED('${r.id}', event)">📺 Enviar a pantalla</button>
        <button class="btn-reject" onclick="rejectRequest('${r.id}', event)">✕</button>
      </div>
    </div>
  `).join('');
}

function selectCard(id) {
  selectedId = id;
  const r = requests.find(x => x.id === id);
  if (r) updateLEDPreview(r);
  renderList();
}

function updateLEDPreview(r) {
  document.getElementById('ledContent').innerHTML = `
    <div class="led-song">${esc(r.song)}</div>
    ${r.artist ? '<div class="led-artist">— ' + esc(r.artist) + '</div>' : ''}
    ${r.igUser ? `<div class="led-user"><div class="led-ig-logo">📸</div><div class="led-username">@${esc(r.igUser)}</div></div>` : ''}
    ${r.message ? '<div class="led-msg">"${esc(r.message)}"</div>' : ''}
  `;
}

async function sendToLED(id, e) {
  e.stopPropagation();
  const r = requests.find(x => x.id === id);
  if (!r) return;
  await fetch(BACKEND_URL + '/display', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(r)
  });
  updateLEDPreview(r);
  openFullscreen();
}

async function rejectRequest(id, e) {
  e.stopPropagation();
  await fetch(BACKEND_URL + '/reject/' + id, { method: 'DELETE' });
  requests = requests.filter(x => x.id !== id);
  if (selectedId === id) selectedId = null;
  renderList();
}

function openFullscreen() {
  const r = selectedId ? requests.find(x => x.id === selectedId) : null;
  const params = r ? '?song=' + encodeURIComponent(r.song) + '&artist=' + encodeURIComponent(r.artist||'') + '&user=' + encodeURIComponent(r.igUser||'') + '&msg=' + encodeURIComponent(r.message||'') : '';
  window.open('screen.html' + params, 'LED_SCREEN', 'fullscreen=yes');
}

function timeSince(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return 'hace ' + diff + 's';
  if (diff < 3600) return 'hace ' + Math.floor(diff/60) + 'm';
  return 'hace ' + Math.floor(diff/3600) + 'h';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Poll cada 2 segundos para nuevas solicitudes
fetchRequests();
setInterval(fetchRequests, 2000);

// SSE si el backend lo soporta
try {
  const es = new EventSource(BACKEND_URL + '/events');
  es.onmessage = (e) => { fetchRequests(); };
} catch(e) {}
</script>
</body>
</html>
